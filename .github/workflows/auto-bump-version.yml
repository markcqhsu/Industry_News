name: Auto Bump Version

on:
  push:
    branches: [main]

jobs:
  bump:
    # Skip if this commit is already a version bump (prevents infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'Bump version to')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in index.html
        run: |
          CURRENT=$(grep -o 'V[0-9]*\.[0-9]*\.[0-9]*' index.html | head -1)
          MAJOR=$(echo "$CURRENT" | awk -F'[V.]' '{print $2}')
          MINOR=$(echo "$CURRENT" | awk -F'[V.]' '{print $3}')
          PATCH=$(echo "$CURRENT" | awk -F'[V.]' '{print $4}')
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="V${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "Bumping $CURRENT → $NEW_VERSION"
          sed -i "s/$CURRENT/$NEW_VERSION/g" index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Bump version to $NEW_VERSION"
          git push
